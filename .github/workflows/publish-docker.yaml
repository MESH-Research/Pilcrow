name: Publish Docker Images
on:
  push:
    branches:
      - master
    tags:
      - "v*"
permissions:
  packages: write
  contents: write
concurrency:
  group: dockerpub-${{ format('{0}-{1}', github.ref_name || github.run_number, github.job) }}
  cancel-in-progress: true

jobs:
  # Gate: only publish when the produced artifact actually changes — i.e. when a
  # real image input changed. This keeps a 1:1 between "new image/tag" and "real
  # change", so config-only commits (renovate.json, docs, helm, root manifests)
  # don't mint a new tag or trigger a redeploy.
  #
  # Tags ALWAYS build: a `v*` release bakes VERSION into the images
  # (config/pilcrow.php, version.json), so the artifact genuinely differs even
  # though the release commit only touches manifest/CHANGELOG/package.json.
  changes:
    runs-on: ubuntu-24.04
    outputs:
      build: ${{ steps.decide.outputs.build }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@master
        id: filter
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        with:
          predicate-quantifier: "some"
          filters: |
            src:
              - 'backend/**'
              - 'client/**'
              - 'docker-bake.hcl'
      - id: decide
        env:
          IS_TAG: ${{ startsWith(github.ref, 'refs/tags/') }}
          SRC: ${{ steps.filter.outputs.src }}
        run: |
          # Tag push -> always build; branch push -> build iff an image input changed.
          if [ "$IS_TAG" = "true" ] || [ "$SRC" = "true" ]; then
            echo "build=true" >> "$GITHUB_OUTPUT"
          else
            echo "build=false" >> "$GITHUB_OUTPUT"
            echo "No image inputs changed — skipping build/publish/deploy."
          fi

  publish:
    needs: changes
    if: needs.changes.outputs.build == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout App Release Tag
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Login to Github Packages
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: mesh-research/github-actions/build-image@v2
        name: Build and Push Docker Images
        id: build-image
        with:
          target: release
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload frontend build artifacts to release if a tag is pushed
        if: startsWith(github.ref, 'refs/tags')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.ref_name }} \
            ${{ steps.build-image.outputs.frontend-bundle }}
      - name: Upload sourcemaps to Sentry
        if: steps.build-image.outputs.frontend-bundle != ''
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          BUNDLE: ${{ steps.build-image.outputs.frontend-bundle }}
        run: |
          VERSION=$(git describe --tags --match 'v*')
          echo "Resolved release version: $VERSION"
          mkdir -p /tmp/sourcemap-extract
          tar -xzf "$BUNDLE" -C /tmp/sourcemap-extract
          MAP_COUNT=$(find /tmp/sourcemap-extract -name '*.map' | wc -l)
          echo "Found $MAP_COUNT sourcemap files in bundle"
          if [ "$MAP_COUNT" -eq 0 ]; then
            echo "No sourcemaps to upload; skipping."
            exit 0
          fi
          RELEASE="pilcrow-client@${VERSION}"
          npx --yes @sentry/cli@^2 releases new "$RELEASE"
          npx --yes @sentry/cli@^2 sourcemaps upload \
            --release "$RELEASE" \
            --url-prefix '~/' \
            /tmp/sourcemap-extract
          npx --yes @sentry/cli@^2 releases finalize "$RELEASE"

      # --- Trigger a staging deploy in the private ops repo after a master build.
      # Kept in the publish job (not a separate one) so it reads the build-image
      # step output directly: job outputs that look secret-ish get masked/skipped
      # by GitHub ("Skip output 'tags' since it may contain secret"). Steps abort
      # on a failed build, so the push is guaranteed to have happened first.
      - name: Generate ops token
        if: github.ref == 'refs/heads/master'
        id: token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: MESH-Research
          repositories: pilcrow-deploy
      - name: Dispatch staging deploy
        if: github.ref == 'refs/heads/master'
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
          # The exact tags publish actually pushed (one per line, full image refs).
          TAGS: ${{ steps.build-image.outputs.tags }}
        run: |
          # Pull the sha-<digest> tag straight from what was pushed — never recompute.
          TAG=$(printf '%s\n' "$TAGS" | grep -oiE 'sha-[0-9a-f]{7,40}' | head -1)
          if [ -z "$TAG" ]; then
            echo "::error::no sha- tag found in pushed tags:"; printf '%s\n' "$TAGS"
            exit 1
          fi
          gh api repos/MESH-Research/pilcrow-deploy/dispatches \
            -f event_type=deploy \
            -f "client_payload[tag]=$TAG" \
            -f "client_payload[sha]=$GITHUB_SHA" \
            -f "client_payload[environment]=staging"
