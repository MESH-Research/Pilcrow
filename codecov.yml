coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
    patch:
      default:
        target: auto
        threshold: 1%

flag_management:
  default_rules:
    carryforward: true
  individual_flags:
    - name: client
      paths:
        - client/src/
    - name: backend
      paths:
        - backend/app/

comment:
  layout: "header, diff, flags, components, files"
  require_changes: false

ignore:
  - "**/*.test.*"
  - "**/*.spec.*"
  - "**/*.vitest.*"
  - "**/tests/**"
  - "**/test/**"
  - "client/src/graphql/operations/**"
  - "docs/**"
  - "helm/**"
  # E2E test-isolation infrastructure: only reachable in local/testing
  # environments and exercised by the Playwright suite, which doesn't
  # collect PHP coverage.
  - "backend/app/IntegrationTesting/**"
  - "backend/app/GraphQL/Mutations/IntegrationTesting/**"
  - "backend/app/Http/Middleware/IntegrationTestingMiddleware.php"
