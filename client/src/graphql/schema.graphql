type Mutation {
  """Accept an invitation to a submission as the assigned role"""
  acceptSubmissionInvite(expires: String!, token: String!, user: AcceptSubmissionInviteInput, uuid: String!): User

  """Create a new publication"""
  createPublication(publication: CreatePublicationInput!): Publication!

  """Create a new submission under a publication"""
  createSubmissionDraft(input: CreateSubmissionDraftInput!): Submission!

  """Create a new user"""
  createUser(user: CreateUserInput!): User!

  """Delete an inline comment of a submission"""
  deleteInlineComment(input: DeleteCommentInput!): Submission!

  """Delete an overall comment of a submission"""
  deleteOverallComment(input: DeleteCommentInput!): Submission!

  """
  Create a staged user, assign them as a review coordinator of a submisison,
  and send them an email notification inviting them to accept the assignment
  """
  inviteReviewCoordinator(input: inviteSubmissionUserInput): Submission

  """
  Create a staged user, assign them as a reviewer of a submisison,
  and send them an email notification inviting them to accept the assignment"
  """
  inviteReviewer(input: inviteSubmissionUserInput): Submission

  """Log in to a new session and get the user."""
  login(email: String!, password: String!): User!
  loginOauthCallback(code: String!, provider_name: String!): LoginOauthResponse

  """Log out from the current session, showing the user one last time."""
  logout: User

  """Mark all of a user's notification as read"""
  markAllNotificationsRead: Int
  markInlineCommentRepliesRead(input: MarkInlineCommentsReadInput!): [InlineCommentReply]!
  markInlineCommentsRead(input: MarkInlineCommentsReadInput!): [InlineComment]!

  """Mark a user notification as read"""
  markNotificationRead(id: ID!): Notification!
  markOverallCommentRepliesRead(input: MarkOverallCommentsReadInput!): [OverallCommentReply]!
  markOverallCommentsRead(input: MarkOverallCommentsReadInput!): [OverallComment]!
  registerOauthUser(input: RegisterOauthUserInput): User

  """
  Resend an email notification inviting a staged review coordinator to accept the assignment
  """
  reinviteReviewCoordinator(input: reinviteSubmissionUserInput): Submission

  """
  Resend an email notification inviting a staged reviewer to accept the assignment
  """
  reinviteReviewer(input: reinviteSubmissionUserInput): Submission

  """Send a password reset email to a specified email address"""
  requestPasswordReset(email: String!): Boolean

  """
  Reset the database and run seeders.
  Only available in local and testing environments.
  """
  resetDatabase: String!

  """Update a password from a password reset request"""
  resetPassword(input: ResetPasswordInput): User
  saveGeneralSettings(settings: GeneralSettingsInput!): GeneralSettings

  """(Re)send a verification email to a user.  """
  sendEmailVerification(
    """
    User to resend verification for. If not supplied, defaults to the current user.
    """
    id: ID
  ): User!
  updatePublication(publication: UpdatePublicationInput!): Publication

  """Update an existing submission"""
  updateSubmission(input: UpdateSubmissionInput!): Submission!

  """Update the content of a submission"""
  updateSubmissionContent(input: UpdateSubmissionContent!): Submission!

  """Update the content of a submission with a file upload"""
  updateSubmissionContentWithFile(input: CreateSubmissionFileInput!): Submission!

  """Update user information"""
  updateUser(user: UpdateUserInput!): User!

  """Verify the currently logged in user's email address"""
  verifyEmail(
    """Token expiration as a UNIX epoch timestamp"""
    expires: String!

    """Token supplied to the user via email"""
    token: String!
  ): User!

  """Verify access to an invitation to a submission as the assigned role"""
  verifySubmissionInvite(expires: String!, token: String!, uuid: String!): User
}

