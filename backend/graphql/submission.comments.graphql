extend type Submission {
    inline_comments: [InlineComment!]!
        @hasMany(relation: "inlineComments")
        @softDeletes
    overall_comments: [OverallComment!]!
        @hasMany(relation: "overallComments")
        @softDeletes
}

"""
An inline comment of a submission
"""
type InlineComment implements Comment {
    id: ID!
    content: String!
    created_by: User! @belongsTo(relation: "createdBy")
    updated_by: User! @belongsTo(relation: "updatedBy")
    created_at: DateTimeUtc!
    updated_at: DateTimeUtc!
    deleted_at: DateTimeUtc
    replies: [InlineCommentReply!] @hasMany @softDeletes
    read_at: DateTimeUtc @rename(attribute: "readAt")
    from: Int
    to: Int
}

"""
A reply to an inline comment of a submission
"""
type InlineCommentReply implements Comment {
    id: ID!
    content: String!
    created_by: User! @belongsTo(relation: "createdBy")
    updated_by: User! @belongsTo(relation: "updatedBy")
    created_at: DateTimeUtc!
    updated_at: DateTimeUtc!
    deleted_at: DateTimeUtc
    parent_id: ID!
    reply_to_id: ID!
    read_at: DateTimeUtc @rename(attribute: "readAt")
}

"""
An overall comment of a submission
"""
type OverallComment implements Comment {
    id: ID!
    content: String!
    created_by: User! @belongsTo(relation: "createdBy")
    created_at: DateTimeUtc!
    updated_by: User! @belongsTo(relation: "updatedBy")
    updated_at: DateTimeUtc!
    deleted_at: DateTimeUtc
    replies: [OverallCommentReply!] @hasMany @softDeletes
    read_at: DateTimeUtc @rename(attribute: "readAt")
}

"""
A reply to an overall comment of a submission
"""
type OverallCommentReply implements Comment {
    id: ID!
    content: String!
    created_by: User! @belongsTo(relation: "createdBy")
    updated_by: User! @belongsTo(relation: "updatedBy")
    created_at: DateTimeUtc!
    updated_at: DateTimeUtc!
    deleted_at: DateTimeUtc
    parent_id: ID!
    reply_to_id: ID!
    read_at: DateTimeUtc @rename(attribute: "readAt")
}

extend input UpdateSubmissionInput {
    inline_comments: InlineCommentHasManyInput
        @rename(attribute: "inlineComments")
    overall_comments: OverallCommentHasManyInput
        @rename(attribute: "overallComments")
}

input InlineCommentHasManyInput {
    create: [InlineCommentCreateInput!]
        @rules(
            apply: [
                "App\\Rules\\SubmissionIsReviewable"
                "App\\Rules\\InlineCommentIdValidity"
            ]
        )
    update: [InlineCommentUpdateInput!]
}

interface Comment {
    id: ID!
    content: String!
    created_by: User!
    updated_by: User!
    created_at: DateTimeUtc!
    updated_at: DateTimeUtc!
    deleted_at: DateTimeUtc
    read_at: DateTimeUtc @rename(attribute: "readAt")
}
type InlineCommentCreatePayload {
    payload: InlineComment!
    query: Query
}

type InlineCommentUpdatePayload {
    payload: InlineComment!
    query: Query
}

type OverallCommentCreatePayload {
    payload: OverallComment!
    query: Query
}

type OverallCommentUpdatePayload {
    payload: OverallComment!
    query: Query
}

input OverallCommentUpdateInput @validator {
    id: ID!
    content: String!
}

input OverallCommentCreateInput @validator {
    content: String!
    submission_id: ID!
    parent_id: ID
    reply_to_id: ID
}

input InlineCommentCreateInput @validator {
    content: String!
    from: Int
    to: Int
    parent_id: ID
    reply_to_id: ID
    submission_id: ID!
}

input InlineCommentUpdateInput @validator {
    id: ID!
    content: String
    from: Int
    to: Int
}

extend type Mutation @guard {
    inlineCommentCreate(
        input: InlineCommentCreateInput!
    ): InlineCommentCreatePayload!
        @create
        @canFind(
            find: "submission_id"
            model: "App\\Models\\Submission"
            ability: "createComment"
        )
    overallCommentCreate(
        input: OverallCommentCreateInput!
    ): OverallCommentCreatePayload!
        @create
        @canFind(
            find: "submission_id"
            model: "App\\Models\\Submission"
            ability: "createComment"
        )

    inlineCommentUpdate(
        input: InlineCommentUpdateInput!
    ): InlineCommentUpdatePayload!
        @update
        @canFind(
            find: "id"
            model: "App\\Models\\InlineComment"
            ability: "update"
        )
    overallCommentUpdate(
        input: OverallCommentUpdateInput!
    ): OverallCommentUpdatePayload!
        @update
        @canFind(
            find: "id"
            model: "App\\Models\\OverallComment"
            ability: "update"
        )

    markInlineCommentsRead(
        input: MarkInlineCommentsReadInput!
    ): [InlineComment]!
        @field(
            resolver: "App\\GraphQL\\Mutations\\CommentStatusMutator@inlineRead"
        )
    markInlineCommentRepliesRead(
        input: MarkInlineCommentsReadInput!
    ): [InlineCommentReply]!
        @field(
            resolver: "App\\GraphQL\\Mutations\\CommentStatusMutator@inlineRead"
        )
    markOverallCommentsRead(
        input: MarkOverallCommentsReadInput!
    ): [OverallComment]!
        @field(
            resolver: "App\\GraphQL\\Mutations\\CommentStatusMutator@overallRead"
        )
    markOverallCommentRepliesRead(
        input: MarkOverallCommentsReadInput!
    ): [OverallCommentReply]!
        @field(
            resolver: "App\\GraphQL\\Mutations\\CommentStatusMutator@overallRead"
        )
}

input MarkInlineCommentsReadInput {
    submission_id: ID!
    comment_ids: [ID!]!
}

input MarkOverallCommentsReadInput {
    submission_id: ID!
    comment_ids: [ID!]!
}
