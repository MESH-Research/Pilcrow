extend type Mutation {
    """
    Toggle the authenticated user's opt-in for a feature. Opting in adds
    the key, opting out removes it. The only gate is that the feature key
    is known (in the catalog); beta access is not checked here — beta
    governs client advertisement, not server authorization.
    """
    setFeatureOptIn(feature: String!, enabled: Boolean!): User!
        @guard
        @field(resolver: "App\\GraphQL\\Mutations\\FeatureOptIn@setFeatureOptIn")

    """
    Grant or revoke a user's access to private beta features.
    Application-administrator only.
    """
    setUserBetaAccess(id: ID!, enabled: Boolean!): User!
        @can(ability: "manageBeta", find: "id")
        @field(resolver: "App\\GraphQL\\Mutations\\FeatureOptIn@setUserBetaAccess")
}
