"A personal access token for API authentication"
type PersonalAccessToken {
    id: ID!
    name: String!
    last_used_at: DateTimeUtc
    created_at: DateTimeUtc!
    expires_at: DateTimeUtc
}

"Response when creating a new personal access token"
type CreatePersonalAccessTokenResponse {
    "The plain text token value. This is only available once at creation time."
    token: String!
    "The token record"
    personalAccessToken: PersonalAccessToken!
}

extend type Query @guard {
    "List all personal access tokens for the current user"
    personalAccessTokens: [PersonalAccessToken!]!
        @field(resolver: "App\\GraphQL\\Queries\\PersonalAccessTokens")
}

extend type Mutation @guard {
    "Create a new personal access token for the current user"
    createPersonalAccessToken(
        "A name to identify this token"
        name: String!
    ): CreatePersonalAccessTokenResponse!
        @field(resolver: "App\\GraphQL\\Mutations\\PersonalAccessToken@create")

    "Revoke a personal access token"
    revokePersonalAccessToken(
        "The ID of the token to revoke"
        id: ID!
    ): Boolean!
        @field(resolver: "App\\GraphQL\\Mutations\\PersonalAccessToken@revoke")
}
