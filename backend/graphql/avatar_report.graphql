"""
A report filed by a user flagging another user's avatar for moderator
review.
"""
type AvatarReport {
    id: ID!
    "User whose avatar was reported."
    user: User! @belongsTo
    """
    Moderator-gated URL to the retained private snapshot of the exact avatar
    that was reported. Captured at report time, so it stays accurate even if
    the user later changes or removes their avatar. Null once the snapshot has
    been purged (after resolution) or if it was never captured.
    """
    reported_avatar_url: String @method(name: "getReportedAvatarUrl")
    "User who filed the report. Null if that user has since been deleted."
    reporter: User @belongsTo
    "Free-text reason provided by the reporter."
    reason: String
    created_at: DateTimeUtc!
    updated_at: DateTimeUtc!
}

extend type Query {
    """
    The pending avatar-report queue for moderator review. Reports are
    transient — a resolved report is deleted and its decision recorded in the
    moderation audit log — so this only ever returns pending reports. Requires
    the `admin_avatar_moderate` ability (application administrators).
    """
    avatarReports: [AvatarReport!]!
        @paginate(defaultCount: 20, model: "App\\Models\\AvatarReport")
        @can(ability: "admin_avatar_moderate")
}

extend type Mutation {
    """
    Report another user's avatar for moderator review. Any authenticated
    user may report. Filing multiple pending reports against the same
    user is idempotent — the existing pending report is returned.
    """
    reportUserAvatar(
        "ID of the user whose avatar is being reported."
        userId: ID!
        "Optional free-text reason."
        reason: String
    ): AvatarReport!
        @field(resolver: "App\\GraphQL\\Mutations\\ReportUserAvatar")
        @guard

    """
    Dismiss a pending avatar report without removing the avatar. No action is
    taken against the user, so nothing is recorded; the report is simply
    deleted. Returns the reported user.
    """
    dismissAvatarReport(id: ID!): User!
        @field(
            resolver: "App\\GraphQL\\Mutations\\ResolveAvatarReport@dismiss"
        )
        @can(ability: "admin_avatar_moderate")

    """
    Resolve an avatar report and remove the reported avatar (unless the user has
    since changed it, in which case the report is closed as stale). Optionally
    also block the user from uploading a replacement. Records the decision in the
    audit log and deletes the report(s); returns the reported user.
    """
    resolveAvatarReportAndRemoveAvatar(
        id: ID!
        notes: String
        "If true, also set the user's avatar-upload-blocked moderation flag."
        blockFutureUploads: Boolean
    ): User!
        @field(
            resolver: "App\\GraphQL\\Mutations\\ResolveAvatarReport@resolveAndRemove"
        )
        @can(ability: "admin_avatar_moderate")

    """
    Grant or revoke a user's avatar-upload block independent of any
    specific report (e.g. from an admin user-detail page).
    """
    setUserAvatarUploadBlocked(
        userId: ID!
        "True to block the user; false to unblock."
        blocked: Boolean!
    ): User!
        @field(resolver: "App\\GraphQL\\Mutations\\SetUserAvatarUploadBlocked")
        @can(ability: "admin_avatar_moderate")
}
