"""
A user account
"""
type User {
    id: ID!
    display_label: String
    name: String
    email: String!
    username: String!
    created_at: DateTimeUtc!
    updated_at: DateTimeUtc
    email_verified_at: DateTimeUtc
    roles: [Role!]! @belongsToMany
    highest_privileged_role: UserRoles @method(name: "getHighestPrivilegedRole")
    permissions: [Permission!] @belongsToMany
    profile_metadata: ProfileMetadata
    raw_submissions: [Submission!]
        @belongsToMany(relation: "submissions")
        @deprecated(reason: "Use `submissions` (SubmissionAssignment) instead")
    submissions(
        search: String @scope
        roles: [SubmissionUserRoles!] @scope(name: "roleFilter")
        status: [SubmissionStatus!] @scope(name: "statusFilter")
        publication: [ID!] @scope(name: "publicationFilter")
        orderBy: [SubmissionAssignmentOrderBy!] @scope(name: "orderBySubmission")
    ): [SubmissionAssignment!]!
        @hasMany(relation: "submissionAssignments", type: "PAGINATOR", defaultCount: 10)
    publications(
        roles: [PublicationRole!] @scope(name: "roleFilter")
        search: String @scope
        orderBy: [PublicationAssignmentOrderBy!]
            @scope(name: "orderByPublication")
    ): [PublicationAssignment!]!
        @hasMany(relation: "publicationAssignments", type: "PAGINATOR", defaultCount: 10)
    staged: Boolean
    """
    Number of this publication's non-draft submissions on which the
    user is a submitter. Only populated by the Publication.users
    resolver; null otherwise.
    """
    as_submitter_count: Int
    """
    Count of active (in-progress) submissions in this publication
    where the user is a reviewer. "Active" = not yet
    rejected / accepted / archived / deleted. Only populated by the
    Publication.users resolver; null otherwise.
    """
    as_reviewer_active_count: Int
    """
    Count of completed submissions (rejected / accepted / archived
    / deleted) in this publication where the user is a reviewer.
    Only populated by the Publication.users resolver; null otherwise.
    """
    as_reviewer_completed_count: Int
    """
    Count of active (in-progress) submissions where the user is a
    review coordinator. Only populated by the Publication.users
    resolver; null otherwise.
    """
    as_coordinator_active_count: Int
    """
    Count of completed submissions where the user is a review
    coordinator. Only populated by the Publication.users resolver;
    null otherwise.
    """
    as_coordinator_completed_count: Int
}

enum UserRoles {
    submitter @enum(value: 6)
    reviewer @enum(value: 5)
    review_coordinator @enum(value: 4)
    editor @enum(value: 3)
    publication_admin @enum(value: 2)
    application_admin @enum(value: 1)
}
