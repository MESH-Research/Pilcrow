"""
A user account
"""
type User {
    id: ID!
    display_label: String
    name: String
    email: String @redactIfDenied(ability: "viewEmail")
    avatar_color: String! @deprecated(reason: "Temporary placeholder for stable avatar colors; will be removed when user-uploaded avatars are introduced.")
    username: String!
    created_at: DateTimeUtc!
    updated_at: DateTimeUtc
    email_verified_at: DateTimeUtc
    roles: [Role!]! @belongsToMany
    highest_privileged_role: UserRoles @method(name: "getHighestPrivilegedRole")
    """
    Every permission the user effectively has — both directly-assigned
    and inherited via their roles. Uses `getAllPermissions()` rather
    than the `permissions()` relation so role-derived permissions are
    included (e.g. Application Administrators inherit `moderate
    avatars` via the role, not a direct user->permission pivot).
    """
    permissions: [Permission!] @method(name: "getAllPermissions")
    profile_metadata: ProfileMetadata
    "Whether the user has access to private beta features (admin-set)."
    beta: Boolean!
    "Beta feature keys the user has explicitly opted into."
    feature_opt_ins: [String!]! @method(name: "getActiveFeatureOptIns")
    raw_submissions: [Submission!]
        @belongsToMany(relation: "submissions")
        @deprecated(reason: "Use `submissions` (SubmissionAssignment) instead")
    submissions(
        search: String @scope
        roles: [SubmissionUserRoles!] @scope(name: "roleFilter")
        status: [SubmissionStatus!] @scope(name: "statusFilter")
        publication: [ID!] @scope(name: "publicationFilter")
        orderBy: [SubmissionAssignmentOrderBy!] @scope(name: "orderBySubmission")
    ): [SubmissionAssignment!]!
        @hasMany(relation: "submissionAssignments", type: "PAGINATOR", defaultCount: 10)
    publications(
        roles: [PublicationRole!] @scope(name: "roleFilter")
    ): [PublicationAssignment!]!
        @hasMany(relation: "publicationAssignments", type: "PAGINATOR", defaultCount: 10)
    staged: Boolean

    "The user's uploaded avatar, or null if the user has not set one."
    avatar: Avatar @method(name: "getAvatar")

    "True when a moderator has revoked this user's ability to upload an avatar."
    avatar_upload_blocked: Boolean! @method(name: "getAvatarUploadBlocked")
}

"""
An uploaded avatar image with URLs for the original and derived conversions.
"""
type Avatar {
    "URL for the original uploaded image."
    url: String!

    "URL for the 96x96 thumbnail conversion, suitable for inline avatar display."
    thumb_url: String!

    "URL for the 256x256 medium conversion, suitable for profile pages."
    medium_url: String!
}

enum UserRoles {
    submitter @enum(value: 6)
    reviewer @enum(value: 5)
    review_coordinator @enum(value: 4)
    editor @enum(value: 3)
    publication_admin @enum(value: 2)
    application_admin @enum(value: 1)
}
