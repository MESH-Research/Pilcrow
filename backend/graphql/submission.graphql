#import submission.comments.graphql

extend type Query {
    "Return a submission by ID"
    submission(id: ID @eq): Submission @find @canFind(ability: "view", find: "id")

    "Return submissions in publications managed by the current user (application admins see all; publication admins and editors see submissions in publications where they hold that role)."
    submissions(
        status: [SubmissionStatus!] @scope(name: statusFilter)
        my_roles: [SubmissionUserRoles!] @scope(name: myRoleFilter)
        publication: [ID!] @scope(name: publicationFilter)
    ): [Submission!]
        @guard
        @paginate(defaultCount: 100, scopes: ["managedPublicationSubmissions"])
        @orderBy(column: "created_at", direction: DESC)
}

extend type Mutation {
    "Create a new submission under a publication"
    createSubmissionDraft(
        input: CreateSubmissionDraftInput! @spread
    ): Submission! @create @canModel(ability: "create", injectArgs: true)

    """
    Update an existing submission.

    DEPRECATED: this catch-all god-mutation is being dissolved into intent-shaped
    mutations (updateSubmissionContent now also edits the title, submitSubmission,
    changeSubmissionStatus, updateSubmissionSubmitters / Reviewers /
    ReviewCoordinators, createInlineComment, createOverallComment,
    updateInlineComment, updateOverallComment). It stays
    callable while clients migrate; its umbrella now gates on the bridge
    `legacyUpdate` ability (the prior broad `update`) and each input field is
    still authorized per-field by @argPolicy. Remove once no client calls it.
    """
    updateSubmission(input: UpdateSubmissionInput! @spread): Submission!
        @deprecated(
            reason: "Use the intent-shaped submission mutations."
        )
        @update
        @can(ability: "legacyUpdate", find: "id")
        @argPolicy(
            find: "id"
            apply: [
                "submitters:updateSubmitters"
                "reviewers:updateReviewers"
                "reviewCoordinators:updateReviewCoordinators"
                "status:updateStatus"
                "title:updateContent"
                "inlineComments:updateInlineComments"
                "overallComments:updateOverallComments"
            ]
            injectArgs: true
        )

    "Delete an inline comment of a submission"
    deleteInlineComment(input: DeleteCommentInput! @spread): Submission!
        @canFind(
            ability: "delete"
            find: "comment_id"
            model: "App\\Models\\InlineComment"
        )
        @field(resolver: "App\\GraphQL\\Mutations\\CommentMutator@deleteInline")

    "Delete an overall comment of a submission"
    deleteOverallComment(input: DeleteCommentInput! @spread): Submission!
        @canFind(
            ability: "delete"
            find: "comment_id"
            model: "App\\Models\\OverallComment"
        )
        @field(resolver: "App\\GraphQL\\Mutations\\CommentMutator@deleteOverall")

    """
    Update the work itself — the submission's body and/or its title. Both are the
    author's content under the one `update` ability (author-only, draft-only), so
    they share a mutation; supply either or both.
    """
    updateSubmissionContent(
        input: UpdateSubmissionContent! @spread
    ): Submission!
        @canFind(ability: "updateContent", find: "id")
        @field(resolver: "App\\GraphQL\\Mutations\\SubmissionMutator@updateContent")

    "Update the content of a submission with a file upload"
    updateSubmissionContentWithFile(
        input: CreateSubmissionFileInput! @spread
    ): Submission!
        @canFind(ability: "updateContent", find: "submission_id")
        @field(
            resolver: "App\\GraphQL\\Mutations\\SubmissionMutator@updateContentWithFile"
        )

    # --- Intent-shaped submission mutations ----------------------------------
    # Each replaces one slice of the deprecated `updateSubmission` god-mutation
    # with a single business action and one plain @canFind stating its true ability.
    #
    # (Title is the author's content too, so it rides updateSubmissionContent —
    # one `update` ability, one mutation for the work — rather than its own.)

    "Send a draft submission in for review."
    submitSubmission(submission_id: ID!): Submission!
        @canFind(ability: "submit", find: "submission_id")
        @field(resolver: "App\\GraphQL\\Mutations\\SubmissionMutator@submit")

    """
    Change a submission's editorial status, together with its status-change
    comment (the comment is gated by the same ability — closing the ungated
    status_change_comment field of the god-mutation).
    """
    changeSubmissionStatus(
        input: ChangeSubmissionStatusInput! @spread
    ): Submission! @update @canFind(ability: "updateStatus", find: "id")

    "Manage a submission's co-submitters."
    updateSubmissionSubmitters(
        input: UpdateSubmissionSubmittersInput! @spread
    ): Submission! @update @canFind(ability: "updateSubmitters", find: "id")

    "Manage a submission's reviewers."
    updateSubmissionReviewers(
        input: UpdateSubmissionReviewersInput! @spread
    ): Submission! @update @canFind(ability: "updateReviewers", find: "id")

    "Manage a submission's review coordinators."
    updateSubmissionReviewCoordinators(
        input: UpdateSubmissionReviewCoordinatorsInput! @spread
    ): Submission!
        @update
        @canFind(ability: "updateReviewCoordinators", find: "id")

    "Add an inline comment (or reply) to a submission under review."
    createInlineComment(input: CreateInlineCommentArgs! @spread): Submission!
        @canFind(ability: "review", find: "submission_id")
        @field(resolver: "App\\GraphQL\\Mutations\\CommentMutator@createInline")

    "Add an overall comment (or reply) to a submission under review."
    createOverallComment(input: CreateOverallCommentArgs! @spread): Submission!
        @canFind(ability: "review", find: "submission_id")
        @field(resolver: "App\\GraphQL\\Mutations\\CommentMutator@createOverall")

    """
    Edit an inline comment (or reply). Content for any; a top-level comment may
    also revise its style criteria and range. Author-only — the same gate as
    delete. Replies fold in: a reply is an inline-comment row, edited by id.
    Only the supplied fields change.
    """
    updateInlineComment(input: UpdateInlineCommentArgs! @spread): Submission!
        @canFind(
            ability: "update"
            find: "comment_id"
            model: "App\\Models\\InlineComment"
        )
        @field(resolver: "App\\GraphQL\\Mutations\\CommentMutator@updateInline")

    """
    Edit an overall comment (or reply). Author-only — the same gate as delete.
    Replies fold in: a reply is an overall-comment row, edited by id.
    """
    updateOverallComment(input: UpdateOverallCommentArgs! @spread): Submission!
        @canFind(
            ability: "update"
            find: "comment_id"
            model: "App\\Models\\OverallComment"
        )
        @field(resolver: "App\\GraphQL\\Mutations\\CommentMutator@updateOverall")

    "Verify access to an invitation to a submission as the assigned role"
    verifySubmissionInvite(
        uuid: String!
        token: String!
        expires: String!
    ): User
        @field(
            resolver: "App\\GraphQL\\Mutations\\VerifySubmissionInvite@verify"
        )

    "Accept an invitation to a submission as the assigned role"
    acceptSubmissionInvite(
        uuid: String!
        token: String!
        expires: String!
        user: AcceptSubmissionInviteInput @spread
    ): User
        @field(
            resolver: "App\\GraphQL\\Mutations\\AcceptSubmissionInvite@accept"
        )

    """
    Create a staged user, assign them as a reviewer of a submisison,
    and send them an email notification inviting them to accept the assignment"
    """
    inviteReviewer(input: inviteSubmissionUserInput @spread): Submission
        @canFind(ability: "updateReviewers", find: "submission_id")
        @field(
            resolver: "App\\GraphQL\\Mutations\\InviteSubmissionUser@inviteReviewer"
        )

    """
    Create a staged user, assign them as a review coordinator of a submisison,
    and send them an email notification inviting them to accept the assignment
    """
    inviteReviewCoordinator(
        input: inviteSubmissionUserInput @spread
    ): Submission
        @canFind(ability: "updateReviewCoordinators", find: "submission_id")
        @field(
            resolver: "App\\GraphQL\\Mutations\\InviteSubmissionUser@inviteReviewCoordinator"
        )

    """
    Resend an email notification inviting a staged reviewer to accept the assignment
    """
    reinviteReviewer(input: reinviteSubmissionUserInput @spread): Submission
        @canFind(ability: "updateReviewers", find: "submission_id")
        @field(
            resolver: "App\\GraphQL\\Mutations\\ReinviteSubmissionUser@reinviteReviewer"
        )

    """
    Resend an email notification inviting a staged review coordinator to accept the assignment
    """
    reinviteReviewCoordinator(
        input: reinviteSubmissionUserInput @spread
    ): Submission
        @canFind(ability: "updateReviewCoordinators", find: "submission_id")
        @field(
            resolver: "App\\GraphQL\\Mutations\\ReinviteSubmissionUser@reinviteReviewCoordinator"
        )
}

input inviteSubmissionUserInput
    @validator(class: "SubmissionInvitationValidator") {
    submission_id: ID!
    email: String!
    message: String
}

input reinviteSubmissionUserInput
    @validator(class: "SubmissionReinvitationValidator") {
    submission_id: ID!
    email: String!
    message: String
}

"""
A Submission
"""
type Submission {
    id: ID!
    title: String
    created_at: DateTimeUtc!
    updated_at: DateTimeUtc
    created_by: User! @belongsTo(relation: "createdBy")
    updated_by: User! @belongsTo(relation: "updatedBy")
    submitted_at: DateTimeUtc
        @with(relation: "audits")
        @method(name: "getSubmittedAt")
    publication: Publication! @belongsTo
    users: [User!]! @belongsToMany
    reviewers: [User!]! @belongsToMany
    review_coordinators: [User!]! @belongsToMany(relation: "reviewCoordinators")
    submitters: [User!]! @belongsToMany
    files: [SubmissionFile]! @hasMany
    assignments: [SubmissionAssignment!]!
        @hasMany(relation: "submissionAssignments")
    status: SubmissionStatus!
    status_change_comment: String
    content: SubmissionContent #This field is optional bc it may be null if the pandoc process is still importing the document
    commenters(type: CommentParticipantType): [User!]! @method(name: "getCommentParticipants")
    my_role: SubmissionUserRoles
        @with(relation: "submissionAssignments")
        @method(name: "getMyRole")
    effective_role: SubmissionUserRoles
        @with(relation: "submissionAssignments")
        @method(name: "getEffectiveRole")
    "The authenticated viewer's granted scoped abilities on this submission (UI hints; server still enforces)."
    abilities: [SubmissionAbility!]!
        @method(name: "abilities")
        @with(relation: "submissionAssignments")
        @with(relation: "publication.publicationAssignments")
    audits: [SubmissionAudit] @belongsToMany
}

"""
An ability on a single submission. The viewer's `abilities` array carries the
granted ones; grants can depend on the submission's current status.
"""
enum SubmissionAbility @abilityEnum(enum: "App\\Auth\\Abilities\\SubmissionAbility")

"""
A user associated with a submission and a role
"""
type SubmissionAssignment {
    id: ID!
    role: SubmissionUserRoles! @rename(attribute: "role")
    user: User! @belongsTo
    submission: Submission! @belongsTo
    created_at: DateTimeUtc!
    updated_at: DateTimeUtc
}

"""
An uploaded file associated with a submission
"""
type SubmissionFile {
    id: ID!
    submission_id: ID!
    file_upload: String!
}

"""
The status of a submission
"""
enum SubmissionStatus {
    DRAFT @enum(value: 0)
    INITIALLY_SUBMITTED @enum(value: 1)
    RESUBMISSION_REQUESTED @enum(value: 2)
    RESUBMITTED @enum(value: 3)
    AWAITING_REVIEW @enum(value: 4)
    REJECTED @enum(value: 5)
    ACCEPTED_AS_FINAL @enum(value: 6)
    EXPIRED @enum(value: 7)
    UNDER_REVIEW @enum(value: 8)
    AWAITING_DECISION @enum(value: 9)
    REVISION_REQUESTED @enum(value: 10)
    ARCHIVED @enum(value: 11)
    DELETED @enum(value: 12)
}

input DeleteCommentInput {
    submission_id: ID!
    comment_id: ID!
}

"""
Add an inline comment (or reply). The coherence validator reads parent_id /
reply_to_id / submission_id off this input to enforce a well-formed thread.
"""
input CreateInlineCommentArgs
    @validator(class: "CreateInlineCommentValidator") {
    submission_id: ID!
    content: String!
    style_criteria: [ID!] @transformStyleCriteriaIds
    from: Int
    to: Int
    parent_id: ID
    reply_to_id: ID
}

"Add an overall comment (or reply); coherence validated as for inline."
input CreateOverallCommentArgs
    @validator(class: "CreateOverallCommentValidator") {
    submission_id: ID!
    content: String!
    parent_id: ID
    reply_to_id: ID
}

"""
Edit an inline comment (or reply). Only the supplied fields change — content for
any row; style criteria and range for a top-level comment.
"""
input UpdateInlineCommentArgs {
    submission_id: ID!
    comment_id: ID!
    content: String
    style_criteria: [ID!] @transformStyleCriteriaIds
    from: Int
    to: Int
}

"Edit an overall comment (or reply). Only the supplied content changes."
input UpdateOverallCommentArgs {
    submission_id: ID!
    comment_id: ID!
    content: String
}

"""
Input type for creating a new submission via the createSubmissionDraft mutation
"""
input CreateSubmissionDraftInput
    @validator(class: "SubmissionDraftInputValidator") {
    title: String! @trim
    publication_id: ID!
    submitters: CreateSubmissionUserInput
}

input AcceptSubmissionInviteInput
    @validator(class: "SubmissionInvitationAcceptanceValidator") {
    id: ID!
    name: String
    username: String!
    password: String!
}

input UpdateSubmissionInput @validator {
    id: ID!
    title: String @trim
    status: SubmissionStatus
    status_change_comment: String @trim
    reviewers: UpdateSubmissionUserInput
    review_coordinators: UpdateSubmissionUserInput
        @rename(attribute: "reviewCoordinators")
    submitters: UpdateSubmissionUserInput
}

input UpdateSubmissionContent @validator {
    id: ID!
    "The submission body. Optional so the title may be edited on its own."
    content: String
    "The submission title — the author's content, edited alongside or instead of the body."
    title: String @trim
}

"Intent-shaped inputs, one per dedicated submission mutation."
input ChangeSubmissionStatusInput {
    id: ID!
    status: SubmissionStatus!
    status_change_comment: String @trim
}

input UpdateSubmissionSubmittersInput {
    id: ID!
    submitters: UpdateSubmissionUserInput
}

input UpdateSubmissionReviewersInput {
    id: ID!
    reviewers: UpdateSubmissionUserInput
}

input UpdateSubmissionReviewCoordinatorsInput {
    id: ID!
    review_coordinators: UpdateSubmissionUserInput
        @rename(attribute: "reviewCoordinators")
}

input CreateSubmissionUserInput {
    connect: [ID!]!
}

input UpdateSubmissionUserInput {
    connect: [ID!]
    disconnect: [ID!]
}

"""
Input type for connecting newly created submissions to files via nested mutation
"""
input CreateSubmissionFilesHasMany {
    create: Upload!
}

"""
Input type for creating a new association between an uploaded file and a submission
"""
input CreateSubmissionFileInput
    @validator(class: "SubmissionFileInputValidator") {
    submission_id: ID!
    file_upload: Upload!
}

"""
The content of a submission
"""
type SubmissionContent {
    id: ID!
    data: String!
    created_at: DateTimeUtc!
    modified_at: DateTimeUtc!
    src_file: SubmissionFile!
}

"""
Sortable columns for submission assignments.
"""
enum SubmissionAssignmentOrderByColumn {
    CREATED_AT
    UPDATED_AT
    TITLE
    STATUS
}

"""
Order by clause for submission assignments.
"""
input SubmissionAssignmentOrderBy {
    column: SubmissionAssignmentOrderByColumn!
    order: SortOrder!
}

enum SubmissionUserRoles {
    submitter @enum(value: "submitter")
    reviewer @enum(value: "reviewer")
    review_coordinator @enum(value: "review_coordinator")
}

"""
The type of comments to find participants for
"""
enum CommentParticipantType {
    INLINE
    OVERALL
}
