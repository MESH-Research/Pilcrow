extend type Query {
    "Return a publication by ID"
    publication(id: ID @eq): Publication @find @canFind(ability: "view", find: "id")

    "Return all publications"
    publications(
        search: String @scope
        public: Boolean @scope(name: "public")
        accepting_submissions: Boolean @scope(name: "acceptingSubmissions")
        my_role: PublicationRole @scope(name: "myRole")
        orderBy: _ @orderBy(columns: ["name", "created_at"])
    ): [Publication!]!
        @paginate(defaultCount: 10, scopes: ["visible"])
        @orderBy(column: "name", direction: ASC)
}

"""
A publication that has users, reviews, and submissions
"""
type Publication {
    id: ID!
    name: String!
    home_page_content: String
    new_submission_content: String
    created_at: DateTimeUtc
    updated_at: DateTimeUtc
    submissions: [Submission]! @hasMany
    publication_admins: [User!]! @belongsToMany(relation: "publicationAdmins")
    editors: [User!]! @belongsToMany(relation: "editors")
    is_publicly_visible: Boolean
    is_accepting_submissions: Boolean
    style_criterias: [StyleCriteria!]! @hasMany(relation: "styleCriterias")
    my_role: PublicationRole @method(name: "getMyRole")
    effective_role: PublicationRole @method(name: "getEffectiveRole")
    "The authenticated viewer's granted scoped abilities on this publication (UI hints; server still enforces)."
    abilities: [PublicationAbility!]!
        @method(name: "abilities")
        @with(relation: "publicationAssignments")
}

"""
An ability on a single publication. The viewer's `abilities` array carries the
granted ones.
"""
enum PublicationAbility @abilityEnum(enum: "App\\Auth\\Abilities\\PublicationAbility")

type PublicationAssignment {
    id: ID!
    role: PublicationRole! @rename(attribute: "role")
    user: User! @belongsTo
    publication: Publication! @belongsTo
    created_at: DateTimeUtc!
    updated_at: DateTimeUtc
}

type StyleCriteria {
    id: ID!
    name: String!
    description: String
    publication: Publication!
    icon: String
}

extend type Mutation {
    "Create a new publication"
    createPublication(
        publication: CreatePublicationInput! @spread
    ): Publication! @create @canModel(ability: "create")

    updatePublication(
        publication: UpdatePublicationInput! @spread
    ): Publication @update @canModel(ability: "update", injectArgs: true)
}

input CreatePublicationInput {
    name: String
    is_publicly_visible: Boolean
    home_page_content: String
    new_submission_content: String
    style_criterias: CreateStyleCriteriaHasMany
        @rename(attribute: "styleCriterias")
}

input CreateStyleCriteriaHasMany {
    create: [CreateStyleCriteriaInput!]
}

input CreateStyleCriteriaInput {
    name: String!
    description: String
    icon: String
}

input UpdatePublicationInput {
    id: ID!
    name: String
    description: String
    is_publicly_visible: Boolean
    is_accepting_submissions: Boolean
    home_page_content: String
    new_submission_content: String
    style_criterias: UpdateStyleCriteriaHasMany
        @rename(attribute: "styleCriterias")
    editors: UpdatePublicationEditorsInput
    publication_admins: UpdatePublicationAdministratorsInput
        @rename(attribute: "publicationAdmins")
}

input UpdatePublicationAdministratorsInput {
    connect: [ID!]
    disconnect: [ID!]
}

input UpdatePublicationEditorsInput {
    connect: [ID!]
    disconnect: [ID!]
}

input UpdateStyleCriteriaHasMany {
    create: [CreateStyleCriteriaInput!]
    update: [UpdateStyleCriteriaInput!]
    delete: [ID!]
}

input UpdateStyleCriteriaInput {
    id: ID!
    name: String
    description: String
    icon: String
}

enum PublicationRole {
    publication_admin @enum(value: "publication_admin")
    editor @enum(value: "editor")
}
