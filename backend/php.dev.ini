; Pilcrow PHP Configuration
; Used by both Lando (development) and CI (testing) for consistency

; Error reporting - development friendly
error_reporting = E_ALL & ~E_DEPRECATED
display_errors = On
display_startup_errors = On
log_errors = On

; Memory - sufficient for tests and development
memory_limit = 256M

; Performance
realpath_cache_size = 4096K
realpath_cache_ttl = 600

; MySQL driver - disable memory statistics collection
; This adds significant overhead and isn't needed for development/testing
mysqlnd.collect_memory_statistics = Off
