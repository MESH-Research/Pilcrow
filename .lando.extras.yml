cypress:
  description: Install the cypress test runner and tooling command.
  template:
    services:
      cypress:
        type: node:22
        overrides:
          image: "cypress/base:22.20.0"
          environment:
            ELECTRON_EXTRA_LAUNCH_ARGS: "--force-prefers-reduced-motion"
            NODE_TLS_REJECT_UNAUTHORIZED: "0"
        build:
          - yarn config set strict-ssl false -g && cd /app/cypress && yarn
    tooling:
      cypress:
        service: cypress
        dir: /app/cypress
        cmd: yarn cypress
mailhog:
  description: Catch mail output from Pilcrow with mailhog.
  template:
    services:
      mailhog:
        type: mailhog:v1.0.0
        hogfrom:
          - appserver
    proxy:
      mailhog:
        - mailhog.pilcrow.lndo.site
